<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            background:black;
            overflow:hidden;
            font-family:Arial;
        }

        #player{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            overflow:hidden;
            background:black;
        }

        /* force youtube iframe to cover screen */
        #player iframe{
            position:absolute;
            top:50%;
            left:50%;
            width:110vw;
            height:110vh;
            transform:translate(-50%,-50%);
            pointer-events:none;
        }

        #overlay{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            z-index:10;
        }

        #tapSound{
            position:fixed;
            bottom:40px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.7);
            color:white;
            padding:10px 16px;
            border-radius:20px;
            font-size:14px;
            z-index:20;
        }

        #centerControl{
            pointer-events:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:65px;
            height:65px;
            background:rgba(0,0,0,0.45);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:30;
            display:none;
        }

        #centerControl svg{
            width:28px;
            height:28px;
            fill:white;
        }
    </style>
    <title>Youtube Shorts</title>
</head>

<body>

<div id="player"></div>
<div id="overlay"></div>
<div id="tapSound">Tap to enable sound</div>
<div id="centerControl"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

    let player
    let currentIndex = 0
    let videoIds = []
    let isPlaying = false

    let isUnmuted = false
    let startY = 0
    let lastGestureTime = 0
    const GESTURE_LOCK = 250
    let autoPlayPending = false

    let overlay = document.getElementById("overlay")
    let centerControl = document.getElementById("centerControl")

    /* ---------------- API CONFIG ---------------- */

    const API_URL = "https://growonlinked.in/reels/feeds"
    const CATEGORY_ID = "69a4542b74128f436f701916"
    const LIMIT = 5

    let cursorId = null
    let loading = false

    const AUTH_TOKEN ="Bearer "+"eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiI5ODI2MTI5NDYxIiwiaWF0IjoxNzczMjQzNjg3LCJleHAiOjE3NzMzNjM2ODd9.eey7ApBMsBUcQYF9kFz64hsGEMxfnR4L_O0CM56UQdE9YXAZUrhFty1jk927mTp3osKkXdZ-NL8HtVqfcYDt2Q"

    /* ---------------- API CALL ---------------- */

    async function fetchReels(){
        if(loading)
            return

        loading = true
        let url = `${API_URL}?categoryId=${CATEGORY_ID}&limit=${LIMIT}`

        if(cursorId){
            url += `&cursorId=${cursorId}`
        }

        try{
            const res = await fetch(url,{
                headers:{
                    "Authorization":AUTH_TOKEN
                }
            })

            const json = await res.json()
            const reels = json.data.reels
            cursorId = json.data.cursorId
            reels.forEach(r=>{
                videoIds.push(r.videoId)
            })
            console.log("Loaded reels:", reels.length)

        }catch(e){
            console.error("API error", e)
        }
        loading = false
    }

    /* ---------------- INITIAL LOAD ---------------- */

    async function initFeed(){
        await fetchReels()
        //onYouTubeIframeAPIReady()
        if(videoIds.length === 0){
            console.error("No videos returned from API")
            return
        }

        if(window.YT && YT.Player){
            createPlayer()
        }
    }

    /* -------------- CREATE PLAYER --------------------*/

    function createPlayer(){
        player = new YT.Player('player',{
            videoId: videoIds[currentIndex],
            playerVars: {
                autoplay:1,
                mute:1,
                controls:0,
                modestbranding:1,
                rel:0,
                playsinline:1,
                showinfo:0,
                iv_load_policy:3,
                fs:0,
                disablekb:1
            },
            events:{
                onReady:function(e){
                    player = e.target
                    setTimeout(()=>{
                        try{
                            player.mute()        // start muted (required for autoplay on mobile/webview)
                            player.playVideo()   // start first video
                        }catch(err){
                            console.log("Autoplay blocked")
                        }
                    },300)
                },
                onStateChange:function(e){
                    if(e.data === YT.PlayerState.ENDED){
                        nextVideo()
                    }

                    if(e.data === YT.PlayerState.CUED && autoPlayPending){

                        autoPlayPending = false

                        try{

                            player.playVideo()

                            if(isUnmuted){
                                player.unMute()
                                player.setVolume(100)
                            }else{
                                player.mute()
                            }

                        }catch(err){}

                    }
                }
            }
        })
    }

    /* ---------------- YOUTUBE PLAYER ---------------- */

    function onYouTubeIframeAPIReady(){
        if(videoIds.length > 0){
            createPlayer()
        }
    }

    /* ---------------- VIDEO NAVIGATION ---------------- */

    function nextVideo(){

        if(currentIndex < videoIds.length - 1){

            currentIndex++

            centerControl.style.display = "none"

            try{
                player.loadVideoById(videoIds[currentIndex])
            }catch(e){}

            if(isUnmuted){
                player.unMute()
                player.setVolume(100)
            }else{
                player.mute()
            }

            /* PREFETCH MORE REELS WHEN USER REACHES 3rd VIDEO */
            if(videoIds.length - currentIndex <= 2){
                fetchReels()
            }
        }
    }

    function prevVideo(){

        if(currentIndex > 0){

            currentIndex--

            centerControl.style.display = "none"

            try{
                player.loadVideoById(videoIds[currentIndex])
            }catch(e){}

            if(isUnmuted){
                player.unMute()
                player.setVolume(100)
            }else{
                player.mute()
            }
        }
    }

    /* ---------------- ICON UI ---------------- */

    function showPlayIcon(){

        centerControl.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"></path>
                </svg>`
        centerControl.style.display="flex"
    }

    function showPauseIcon(){

        centerControl.innerHTML = `
                <svg viewBox="0 0 24 24">
                <path d="M6 5h4v14H6zm8 0h4v14h-4z"></path>
                </svg>`
        centerControl.style.display="flex"
    }

    /* ---------------- TAP LOGIC ---------------- */
    function handleTap(){

        if(!isUnmuted){
            player.unMute()
            player.setVolume(100)

            isUnmuted = true
            document.getElementById("tapSound").style.display="none"

            return
        }

        let state = player.getPlayerState()


        if(state === YT.PlayerState.PLAYING){

            player.pauseVideo()
            showPlayIcon()

        }else{

            player.playVideo()
            showPauseIcon()

            setTimeout(()=>{
                centerControl.style.display="none"
            },500)
        }
    }

    /* ---------------- TOUCH EVENTS ---------------- */

    overlay.addEventListener("touchstart",function(e){
        startY = e.touches[0].clientY
    })

    overlay.addEventListener("touchend",function(e){
        let now = Date.now()
        if(now - lastGestureTime < GESTURE_LOCK) return
        lastGestureTime = now

        let endY = e.changedTouches[0].clientY
        handleGesture(startY,endY)
    })

   /* overlay.addEventListener("pointerdown",function(e){
        startY = e.clientY
    })

    overlay.addEventListener("pointerup",function(e){
        let now = Date.now()
        if(now - lastGestureTime < GESTURE_LOCK) return
        lastGestureTime = now

        handleGesture(startY,e.clientY)
    })*/

    /* ---------------- CLICK DESKTOP ---------------- */

    overlay.addEventListener("click",function(){
        let now = Date.now()
        if(now - lastGestureTime < GESTURE_LOCK) return
        lastGestureTime = now

        handleTap()

    })

    /* ---------------- SCROLL DESKTOP ---------------- */

    overlay.addEventListener("wheel",function(e){
        if(e.deltaY > 0){
            nextVideo()
        }else{
            prevVideo()
        }
    })
    /* ---------------- START APP ---------------- */
    initFeed()

    document.body.addEventListener("click",function(){

        if(player){
            try{
                player.playVideo()
            }catch(e){}
        }

    },{once:true})

    function handleGesture(start,end){

        let diff = start - end

        if(Math.abs(diff) > 90){

            if(diff > 0){
                nextVideo()
            }else{
                prevVideo()
            }

            return
        }

        handleTap()
    }


    function unlockPlayer(){
        try{
            player.mute();
            player.playVideo();
        }catch(e){
            console.log("unlock failed");
        }
    }
</script>

</body>
</html>
