<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* player container */
#player{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* crop youtube UI (hide shorts icons) */
#player iframe{
    position:absolute;
    top:-80px;
    height:calc(100% + 160px);
}

</style>

</head>


<body>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

var player;
var ready = false;

/* YouTube API Ready */

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player', {

        width:'100%',
        height:'100%',
        videoId:'dQw4w9WgXcQ',   // default video (can be empty)

        playerVars:{
            autoplay:1,
            mute:1,
            controls:0,
            modestbranding:1,
            rel:0,
            fs:0,
            iv_load_policy:3,
            playsinline:1,
            showinfo:0,
            disablekb:1
        },

        events:{
            'onReady':onPlayerReady
        }

    });

}


/* When Player Ready */

function onPlayerReady(event){

    ready = true;

    event.target.mute();
    event.target.playVideo();

}


/* Function to play new reel */

function playVideo(videoId){

    if(!ready){
        console.log("Player not ready");
        return;
    }

    player.loadVideoById({
        videoId:videoId,
        startSeconds:0,
        suggestedQuality:'large'
    });

    player.mute();
    player.playVideo();

}


/* Optional controls */

function pauseVideo(){

    if(player) player.pauseVideo();

}

function resumeVideo(){

    if(player) player.playVideo();

}

</script>


</body>
</html>
