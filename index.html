<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <style>

        body{
            margin:0;
            background:black;
            overflow:hidden;
            font-family:Arial;
        }

        /* Reel screen */

        #reelPlayer{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
        }

        /* youtube player */

        #player{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
        }

        /* overlay */

        .overlay{
            position:absolute;
            bottom:100px;
            left:15px;
            color:white;
            width:75%;
        }

        .channel{
            font-weight:bold;
            margin-bottom:6px;
        }

        .title{
            font-size:14px;
            line-height:1.4;
        }

        /* right actions */

        .actions{
            position:absolute;
            right:10px;
            bottom:150px;
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .action{
            width:50px;
            height:50px;
            border-radius:25px;
            background:rgba(255,255,255,0.2);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:12px;
        }

        /* play icon */

        #playIcon{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:60px;
            color:white;
            opacity:0;
            transition:.2s;
        }

    </style>
</head>

<body>

<div id="reelPlayer">

    <div id="player"></div>

    <div class="overlay">

        <div class="channel" id="channel"></div>
        <div class="title" id="title"></div>

    </div>

    <div class="actions">
        <div class="action">❤</div>
        <div class="action">💬</div>
        <div class="action">🔗</div>
    </div>

    <div id="playIcon">▶</div>

</div>

<script>

    /* CONFIG */

    const API="https://growonlinked.in/reels/feeds"
    const CATEGORY_ID="69a4542b74128f436f701916"
    const TOKEN="YOUR_TOKEN"

    /* STATE */

    let reels=[]
    let cursorId=null
    let currentIndex=0
    let player

    /* TOUCH */

    let touchStartY=0
    let touchEndY=0

    /* YOUTUBE API */

    var tag=document.createElement("script")
    tag.src="https://www.youtube.com/iframe_api"
    document.body.appendChild(tag)

    function onYouTubeIframeAPIReady(){

        player=new YT.Player('player',{
            height:'100%',
            width:'100%',
            videoId:'',
            playerVars:{
                controls:0,
                modestbranding:1,
                rel:0,
                playsinline:1
            }
        })

    }

    /* LOAD REELS */

    async function loadReels(){

        let url=`${API}?categoryId=${CATEGORY_ID}&limit=5`

        if(cursorId){
            url+=`&cursorId=${cursorId}`
        }

        let res=await fetch(url,{
            headers:{
                Authorization:"Bearer "+TOKEN
            }
        })

        let json=await res.json()

        cursorId=json.data.cursorId

        reels=reels.concat(json.data.reels)

        if(reels.length>0 && currentIndex===0){

            setTimeout(()=>playReel(0),500)

        }

    }

    /* PLAY REEL */

    function playReel(index){

        if(index<0 || index>=reels.length) return

        currentIndex=index

        let reel=reels[index]

        player.loadVideoById(reel.videoId)

        document.getElementById("channel").innerText="📺 "+reel.channel.name
        document.getElementById("title").innerText=reel.title

        /* preload next */

        if(index>=reels.length-2){
            loadReels()
        }

    }

    /* SWIPE HANDLING */

    document.addEventListener("touchstart",e=>{
        touchStartY=e.changedTouches[0].screenY
    })

    document.addEventListener("touchend",e=>{

        touchEndY=e.changedTouches[0].screenY

        let diff=touchStartY-touchEndY

        /* swipe up */

        if(diff>60){

            playReel(currentIndex+1)

        }

        /* swipe down */

        if(diff<-60){

            playReel(currentIndex-1)

        }

    })

    /* TAP PLAY PAUSE */

    document.addEventListener("click",()=>{

        let state=player.getPlayerState()

        if(state===YT.PlayerState.PLAYING){

            player.pauseVideo()
            showPlayIcon()

        }else{

            player.playVideo()
            hidePlayIcon()

        }

    })

    function showPlayIcon(){

        let icon=document.getElementById("playIcon")
        icon.style.opacity=1

    }

    function hidePlayIcon(){

        let icon=document.getElementById("playIcon")
        icon.style.opacity=0

    }

    /* START */

    loadReels()

</script>

</body>
</html>
